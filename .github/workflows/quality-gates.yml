name: Quality Gates

on:
  pull_request:

jobs:
  verify:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run verification gates
        run: npm run verify
